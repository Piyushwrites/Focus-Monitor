<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Monitor</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --warning: #eab308;
            --alert: #991b1b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.1s ease;
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            padding: 2.5rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        h1 { margin-top: 0; font-size: 1.8rem; }
        p { color: #666; line-height: 1.5; margin-bottom: 1.5rem; }

        .settings-group {
            margin-bottom: 2rem;
            text-align: left;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem; }
        
        select {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #cbd5e1; font-size: 1rem;
            background-color: white; cursor: pointer;
        }

        button {
            background-color: var(--primary); color: white; border: none;
            padding: 12px 24px; font-size: 1.1rem; border-radius: 6px;
            cursor: pointer; font-weight: bold; width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }

        body.active { --bg-color: #e0f2fe; }
        
        .status-badge {
            display: inline-block; margin-top: 1.5rem; padding: 8px 16px;
            border-radius: 9999px; background-color: #e5e7eb;
            color: #4b5563; font-size: 0.9rem; font-weight: 600;
            transition: all 0.3s ease;
        }

        .status-active { background-color: #dcfce7 !important; color: #166534 !important; }
        .status-warning { background-color: #fef08a !important; color: #854d0e !important; }

        .footer {
            position: absolute; bottom: 20px; font-size: 0.85rem;
            color: #94a3b8; letter-spacing: 0.5px;
            z-index: 5;
        }

        /* Custom Full-Screen Alert Modal */
        #alarm-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(153, 27, 27, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #alarm-modal.show {
            opacity: 1;
            pointer-events: auto;
            animation: pulse-bg 0.5s infinite alternate;
        }

        #alarm-modal h2 { font-size: 3rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #alarm-modal p { color: white; font-size: 1.2rem; max-width: 600px; margin-bottom: 2rem; }
        
        #alarm-modal button {
            background-color: white; color: var(--alert); width: auto;
            font-size: 1.2rem; padding: 15px 40px;
        }
        #alarm-modal button:hover { background-color: #f1f5f9; }

        @keyframes pulse-bg {
            from { background-color: rgba(153, 27, 27, 0.95); }
            to { background-color: rgba(185, 28, 28, 0.98); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Focus Monitor</h1>
        <p>This application discourages multitasking. Choose your mode below and activate to begin tracking.</p>
        
        <div class="settings-group">
            <label for="monitor-mode">Monitoring Mode:</label>
            <select id="monitor-mode">
                <option value="tab">Flexible: Allow 1 distraction (Warns first, alarms second)</option>
                <option value="window">Strict: Alarm instantly on focus loss</option>
            </select>
        </div>

        <button id="toggle-btn">Enable Focus Mode</button>
        <br>
        <div id="status" class="status-badge">Status: Inactive</div>
    </div>

    <div id="alarm-modal">
        <h2>🚨 CRITICAL FOCUS LOST 🚨</h2>
        <p>Multitasking destroys cognitive flow state. Please return to your primary task immediately.</p>
        <button id="dismiss-btn">I Will Focus</button>
    </div>

    <footer class="footer">
        A side project by Piyush Sahoo.
    </footer>

    <script>
        let isFocusModeActive = false;
        let audioCtx = null;
        let awayCount = 0; 
        
        const toggleBtn = document.getElementById('toggle-btn');
        const statusBadge = document.getElementById('status');
        const modeSelect = document.getElementById('monitor-mode');
        const alarmModal = document.getElementById('alarm-modal');
        const dismissBtn = document.getElementById('dismiss-btn');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isFocusModeActive = !isFocusModeActive;

            if (isFocusModeActive) {
                awayCount = 0; 
                toggleBtn.innerText = "Disable Focus Mode";
                toggleBtn.style.backgroundColor = "var(--danger)";
                updateStatus("Monitoring...", "status-active");
                body.classList.add('active');
                modeSelect.disabled = true; 
            } else {
                toggleBtn.innerText = "Enable Focus Mode";
                toggleBtn.style.backgroundColor = "var(--primary)";
                updateStatus("Status: Inactive", "");
                body.classList.remove('active');
                modeSelect.disabled = false;
            }
        });

        dismissBtn.addEventListener('click', () => {
            alarmModal.classList.remove('show');
            awayCount = 0; 
            if (isFocusModeActive) {
                updateStatus("Monitoring...", "status-active");
            }
        });

        // Tracks when the user leaves the tab
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && isFocusModeActive) {
                handleFocusLost();
            }
        });

        // Tracks when the user clicks entirely outside the browser
        window.addEventListener('blur', () => {
            if (isFocusModeActive && document.visibilityState === 'visible') {
                 setTimeout(() => {
                     if (!document.hasFocus()) {
                         handleFocusLost();
                     }
                 }, 200);
            }
        });

        function handleFocusLost() {
            const mode = modeSelect.value;
            
            if (mode === 'tab') {
                awayCount++;
                if (awayCount > 1) {
                    triggerIntervention();
                } else {
                    updateStatus("Grace Period Used (Next switch triggers alarm)", "status-warning");
                    playWarningBeep(); 
                }
            } else {
                triggerIntervention();
            }
        }

        function updateStatus(text, className) {
            statusBadge.innerText = text;
            statusBadge.className = "status-badge " + className;
        }

        function playWarningBeep() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.value = 600;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            
            osc.start(now);
            osc.stop(now + 0.2);
        }

        function triggerIntervention() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            
            alarmModal.classList.add('show');
            updateStatus("ALARM TRIGGERED", "status-warning");

            // 3-Loop Red Alert Klaxon
            for (let i = 0; i < 3; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'square'; 
                
                const startTime = now + (i * 0.25);
                osc.frequency.setValueAtTime(600, startTime);
                osc.frequency.setValueAtTime(800, startTime + 0.125);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.5, startTime + 0.02);
                gain.gain.linearRampToValueAtTime(0.5, startTime + 0.23);
                gain.gain.linearRampToValueAtTime(0, startTime + 0.25);

                osc.start(startTime);
                osc.stop(startTime + 0.25);
            }
        }
    </script>
</body>
</html>
